<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Tomato-red circular background -->
  <circle cx="256" cy="256" r="240" fill="#e74c3c"/>

  <!-- Subtle inner rim -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <!-- Clock face circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="8"/>

  <!-- Hour markers -->
  <!-- 12 -->
  <line x1="256" y1="96"  x2="256" y2="120" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- 3 -->
  <line x1="416" y1="256" x2="392" y2="256" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- 6 -->
  <line x1="256" y1="416" x2="256" y2="392" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- 9 -->
  <line x1="96"  y1="256" x2="120" y2="256" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <!-- Minute markers (small ticks at 1, 2, 4, 5, 7, 8, 10, 11) -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="346" y1="109" x2="338" y2="126"/>
    <line x1="403" y1="166" x2="386" y2="174"/>
    <line x1="403" y1="346" x2="386" y2="338"/>
    <line x1="346" y1="403" x2="338" y2="386"/>
    <line x1="166" y1="403" x2="174" y2="386"/>
    <line x1="109" y1="346" x2="126" y2="338"/>
    <line x1="109" y1="166" x2="126" y2="174"/>
    <line x1="166" y1="109" x2="174" y2="126"/>
  </g>

  <!-- Hour hand (shorter, thicker) — pointing roughly at 10 -->
  <line x1="256" y1="256" x2="180" y2="160" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

  <!-- Minute hand (longer, thinner) — pointing roughly at 2 -->
  <line x1="256" y1="256" x2="340" y2="140" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#ffffff"/>
</svg>
