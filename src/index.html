<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pomodoro Timer — 专注番茄钟</title>
  <meta name="description" content="极简番茄钟与任务追踪工具，专注工作，高效管理时间。">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="番茄钟">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <header class="app-header">
    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="切换主题" title="切换主题">🌙</button>
    <h1 class="app-title">Pomodoro Timer</h1>
    <p class="app-subtitle">专注番茄钟 · 任务追踪</p>
  </header>

  <main class="app-main">
    <!-- Timer Section -->
    <section class="timer-section" aria-label="番茄钟计时器">
      <div class="timer-container">
        <div class="timer-mode-indicator" id="timerModeIndicator">专注</div>
        <div class="timer-mode-switcher" role="group" aria-label="切换计时模式">
          <button class="btn btn-mode mode-btn--active" data-mode="FOCUS" aria-pressed="true">专注</button>
          <button class="btn btn-mode" data-mode="SHORT_BREAK" aria-pressed="false">短休息</button>
          <button class="btn btn-mode" data-mode="LONG_BREAK" aria-pressed="false">长休息</button>
        </div>
        <div class="timer-ring-wrapper">
          <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="timer-ring-bg" cx="100" cy="100" r="90" />
            <circle class="timer-ring-progress" id="timerRingProgress" cx="100" cy="100" r="90" />
          </svg>
          <div class="timer-display" id="timerDisplay">25:00</div>
        </div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="timerToggleBtn" aria-label="开始计时">开始</button>
          <button class="btn btn-secondary" id="timerResetBtn" aria-label="重置计时器">重置</button>
          <button class="btn btn-secondary" id="timerSkipBtn" aria-label="跳过当前计时">跳过</button>
        </div>
      </div>
    </section>

    <!-- Task List Section -->
    <section class="tasks-section" aria-label="任务列表">
      <h2 class="section-title">任务列表</h2>
      <div class="task-input-wrapper">
        <input
          type="text"
          class="task-input"
          id="taskInput"
          placeholder="添加新任务..."
          aria-label="输入新任务"
          maxlength="200"
        >
        <button class="btn btn-icon" id="taskAddBtn" aria-label="添加任务">
          <span aria-hidden="true">+</span>
        </button>
      </div>
      <ul class="task-list" id="taskList" role="list">
        <!-- Tasks rendered dynamically -->
      </ul>
      <div class="task-empty-state" id="taskEmptyState">
        <p>暂无任务，添加一个开始专注吧</p>
      </div>
    </section>

    <!-- Statistics Section -->
    <section class="stats-section" aria-label="统计面板">
      <h2 class="section-title">专注统计</h2>
      <div class="stats-today-card">
        <h3 class="stats-today-label">今日专注</h3>
        <p class="stats-today-summary" id="todaySummary">0 次 · 0 分钟</p>
      </div>
      <div class="stats-heatmap" id="statsHeatmap" aria-label="专注热力图">
        <h3 class="heatmap-title">最近 7 天</h3>
        <div id="heatmap" class="heatmap-grid">
          <!-- Heatmap rendered dynamically by stats.js -->
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p class="footer-version">v1.0.0</p>
    <p class="footer-info">专注每一刻</p>
  </footer>

  <!-- PWA Install Prompt -->
  <div class="install-prompt" id="installPrompt" aria-live="polite">
    <span class="install-prompt-icon" aria-hidden="true">🍅</span>
    <div class="install-prompt-text">
      <p class="install-prompt-title">安装番茄钟应用</p>
      <p class="install-prompt-subtitle">添加到主屏幕，随时专注</p>
    </div>
    <div class="install-prompt-actions">
      <button class="btn btn-secondary btn-sm" id="installDismissBtn" type="button">稍后</button>
      <button class="btn btn-primary btn-sm" id="installBtn" type="button">安装</button>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
